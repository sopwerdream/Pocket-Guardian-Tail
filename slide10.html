<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Pocket Guardian Tail — Slide 10 (Thank You)</title>

<link rel="stylesheet" href="ui.css"/>
<link rel="stylesheet" href="lang.css"/>

<style>

body{
margin:0;
overflow:hidden;
font-family:system-ui;
background:#000;
}

/* Background */

.s10-bg{
position:fixed;
inset:0;
background-image:url("thankyou-bg.jpg");
background-size:cover;
background-position:center;
filter:brightness(.9);
}

/* soft vignette */

.s10-bg::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center,transparent 40%,rgba(0,0,0,.6));
}

/* container */

.s10-center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
pointer-events:none;
}

/* THANK YOU text */

.s10-title{
font-size:120px;
font-weight:800;
letter-spacing:6px;

color:#ffe7a4;

text-shadow:
0 0 15px rgba(255,220,120,.7),
0 0 40px rgba(255,200,80,.5);

opacity:0;
transform:translateY(80px);

animation:
fadeUp 1.8s ease forwards,
float 6s ease-in-out infinite 2s;
}

/* subtitle */

.s10-sub{
margin-top:25px;
font-size:26px;
color:#fff8e0;
opacity:.9;

opacity:0;
transform:translateY(40px);

animation:fadeUp 2s ease forwards .5s;
}

/* floating */

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* fade up */

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* particles */

.s10-particles{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.p{
position:absolute;
width:4px;
height:4px;
background:#ffd978;
border-radius:50%;
opacity:.8;

animation:particle 12s linear infinite;
}

@keyframes particle{

0%{
transform:translateY(100vh) scale(.4);
opacity:0;
}

20%{opacity:.9;}

100%{
transform:translateY(-20vh) scale(1);
opacity:0;
}

}

/* nav */

.s10-nav{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
}

.navBtn{
padding:12px 24px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.25);
border-radius:30px;
color:white;
text-decoration:none;
backdrop-filter:blur(10px);
transition:.3s;
}

.navBtn:hover{
background:rgba(255,255,255,.25);
}

.primary{
background:#ffcc66;
color:#000;
}

</style>
</head>

<body>

<div class="s10-bg"></div>

<div class="s10-particles" id="particles"></div>

<div class="s10-center">

<h1 class="s10-title">THANK YOU</h1>

<div class="s10-sub"
data-th="ขอบคุณที่ร่วมผจญภัยกับ Pocket Guardian Tail"
data-en="Thank you for playing Pocket Guardian Tail">
</div>

</div>

<footer class="s10-nav">

<a class="navBtn" href="slide9.html">⬅ Back</a>

<a class="navBtn primary" href="index.html">Finish</a>

</footer>

<script src="lang.js"></script>

<script>

/* create particles */

const container=document.getElementById("particles")

for(let i=0;i<60;i++){

const p=document.createElement("div")

p.className="p"

p.style.left=Math.random()*100+"%"
p.style.animationDelay=Math.random()*12+"s"
p.style.opacity=Math.random()

container.appendChild(p)

}

</script>

</body>
</html>
